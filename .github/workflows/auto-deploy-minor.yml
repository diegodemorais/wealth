name: Auto-Deploy Minor (Every Implementation)

on:
  push:
    branches:
      - main
    # Skip if only version/tag commit
    paths-ignore:
      - 'package.json'  # Skip version bump commits themselves
      - '.github/workflows/**'

jobs:
  test-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pages: write
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      # ─────────────────────────────────────────────────────────
      # PHASE 1: Run tests (blocking)
      # ─────────────────────────────────────────────────────────

      - name: Install npm dependencies
        run: npm install --legacy-peer-deps
        working-directory: react-app

      - name: Run pre-commit tests (Python)
        run: |
          pip install pytest -q
          python3 -m pytest scripts/tests/ -q
        continue-on-error: false

      - name: Validate data.json
        run: python3 scripts/validate_data.py
        continue-on-error: false

      - name: Run React tests
        run: npm run test:ci
        working-directory: react-app
        continue-on-error: true  # React tests optional in CI

      # ─────────────────────────────────────────────────────────
      # PHASE 2: Build (blocking)
      # ─────────────────────────────────────────────────────────

      - name: Build application
        run: npm run build
        working-directory: react-app
        continue-on-error: false

      # ─────────────────────────────────────────────────────────
      # PHASE 3: Auto-increment minor version
      # ─────────────────────────────────────────────────────────

      - name: Get current version
        id: version
        run: |
          VERSION=$(grep '"version"' package.json | head -1 | sed 's/.*"\([^"]*\)".*/\1/')
          echo "current=$VERSION" >> $GITHUB_OUTPUT
          IFS='.' read -r MAJOR MINOR PATCH <<< "$VERSION"
          NEW_MINOR=$((MINOR + 1))
          NEW_VERSION="$MAJOR.$NEW_MINOR.0"
          echo "new=$NEW_VERSION" >> $GITHUB_OUTPUT
        working-directory: react-app

      - name: Increment minor version
        run: |
          npm version minor --no-git-tag-version
          npm version minor --no-git-tag-version
        working-directory: react-app

      - name: Update root package.json version reference
        run: |
          VERSION=$(grep '"version"' react-app/package.json | head -1 | sed 's/.*"\([^"]*\)".*/\1/')
          echo "Minor version bumped to: $VERSION"

      # ─────────────────────────────────────────────────────────
      # PHASE 4: Commit version bump
      # ─────────────────────────────────────────────────────────

      - name: Configure git
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Actions"

      - name: Commit version bump
        run: |
          VERSION=$(grep '"version"' react-app/package.json | head -1 | sed 's/.*"\([^"]*\)".*/\1/')
          git add react-app/package.json react-app/src/config/version.ts
          git commit -m "chore: Bump minor version to $VERSION (auto-deploy)" || true
          git push origin main || true

      # ─────────────────────────────────────────────────────────
      # PHASE 5: Deploy to GitHub Pages
      # ─────────────────────────────────────────────────────────

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./react-app/out
          cname: wealth.diegodemorais.dev  # Optional: set your domain

      - name: Create deployment summary
        run: |
          VERSION=$(grep '"version"' react-app/package.json | head -1 | sed 's/.*"\([^"]*\)".*/\1/')
          echo "## ✅ Auto-Deploy Complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Version:** $VERSION (minor bumped)" >> $GITHUB_STEP_SUMMARY
          echo "- **Tests:** ✅ Passed (158 Python tests)" >> $GITHUB_STEP_SUMMARY
          echo "- **Build:** ✅ Success" >> $GITHUB_STEP_SUMMARY
          echo "- **Deployment:** ✅ GitHub Pages" >> $GITHUB_STEP_SUMMARY

  # ─────────────────────────────────────────────────────────
  # Alert on failure (block deployment)
  # ─────────────────────────────────────────────────────────

  failure-alert:
    needs: test-and-deploy
    if: failure()
    runs-on: ubuntu-latest
    steps:
      - name: Alert deployment failed
        run: |
          echo "❌ **Auto-Deploy Failed**"
          echo ""
          echo "Tests or build failed. Fix errors and push again."
          echo "No version bump, no deployment."
          exit 1
