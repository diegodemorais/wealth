name: Build & Deploy Dashboard

on:
  push:
    paths:
      - react-app/**
      - dash/**
      - .github/workflows/deploy-dashboard.yml
  pull_request:
    paths:
      - react-app/**
      - dash/**

jobs:
  # PASSO 1: Build Next.js
  build:
    runs-on: ubuntu-latest
    name: Build Application

    steps:
      - name: Checkout código
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: react-app/package-lock.json

      - name: Instalar dependências
        run: |
          cd react-app
          npm ci

      - name: Build
        env:
          NEXT_PUBLIC_BUILD_NUMBER: ${{ github.run_number }}
          NEXT_PUBLIC_BUILD_TIMESTAMP: ${{ github.event.head_commit.timestamp || github.event.repository.updated_at || '' }}
        run: |
          cd react-app
          npm run build:no-test

      - name: Upload build artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dash/

  # PASSO 2: Deploy to GitHub Pages (oficial)
  deploy:
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    name: Deploy to GitHub Pages
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to Pages
        id: deployment
        uses: actions/deploy-pages@v4

