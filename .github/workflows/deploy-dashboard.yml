name: Build & Deploy Dashboard

on:
  push:
    paths:
      - react-app/**
      - dash/**
      - .github/workflows/deploy-dashboard.yml
  pull_request:
    paths:
      - react-app/**
      - dash/**

jobs:
  # PASSO 1: Build Next.js
  build:
    runs-on: ubuntu-latest
    name: Build Application
    permissions:
      contents: write
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: react-app/package-lock.json

      - name: Instalar dependências
        run: |
          cd react-app
          npm ci

      - name: Build
        env:
          NEXT_PUBLIC_BUILD_NUMBER: ${{ github.run_number }}
          NEXT_PUBLIC_BUILD_TIMESTAMP: ${{ github.event.head_commit.timestamp || github.event.repository.updated_at || '' }}
          NEXT_PUBLIC_AUTH_HASH: ${{ secrets.NEXT_PUBLIC_AUTH_HASH }}
        run: |
          cd react-app
          npm run build:no-test

      - name: Upload build artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dash/

  # PASSO 2: Deploy to GitHub Pages (oficial)
  deploy:
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    name: Deploy to GitHub Pages
    permissions:
      pages: write
      id-token: write
      contents: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Deploy to Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Increment external version
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          node scripts/increment-version-external.js
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git remote set-url origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git
          git add react-app/public/version.json
          git commit -m "chore: Increment version (post-deploy)" || echo "No version changes"
          git push origin main || echo "Push failed (possibly no changes)"

