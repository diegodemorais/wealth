name: Build & Deploy Dashboard

on:
  push:
    paths:
      - react-app/**
      - dash/**
      - .github/workflows/deploy-dashboard.yml
  pull_request:
    paths:
      - react-app/**
      - dash/**

jobs:
  # PASSO 1: Build Next.js
  build:
    runs-on: ubuntu-latest
    name: Build Application

    steps:
      - name: Checkout código
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: react-app/package-lock.json

      - name: Instalar dependências
        run: |
          cd react-app
          npm ci

      - name: Test & Build
        env:
          NEXT_PUBLIC_BUILD_NUMBER: ${{ github.run_number }}
          NEXT_PUBLIC_BUILD_TIMESTAMP: ${{ github.event.head_commit.timestamp || github.event.repository.updated_at || '' }}
        run: |
          cd react-app
          npm run build

      - name: Upload build artifact
        uses: actions/upload-artifact@v6
        with:
          name: build-dashboard
          path: dash/

  # PASSO 2: Deploy (apenas em push para main e build OK)
  deploy:
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    name: Deploy to /dash/
    permissions:
      contents: write

    steps:
      - name: Checkout código
        uses: actions/checkout@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Download build artifact
        uses: actions/download-artifact@v6
        with:
          name: build-dashboard
          path: dash/

      - name: Commit e push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add dash/
          if git diff --cached --quiet; then
            echo "✅ No changes to deploy"
          else
            git commit -m "🚀 Deploy: Dashboard build to /dash/ [CI skip]"
            git push origin main
            echo "✅ Deployed successfully"
          fi

      - name: Deployment Summary
        if: success()
        run: |
          echo "## Deployment Status ✅"
          echo "- Build: Success"
          echo "- Deploy: Success to gh-pages"

      - name: Deployment Failed
        if: failure()
        run: |
          echo "## Deployment Status ❌"
          echo "- Build: Success"
          echo "- Deploy: Failed"
          echo "Check logs above for details"
          exit 1

  # NOTIFICAÇÃO FINAL: Deploy Completo
  notification:
    runs-on: ubuntu-latest
    needs: [build, deploy]
    if: success()
    name: Deployment Notification

    steps:
      - name: Deployment Complete ✨
        run: |
          echo "╔════════════════════════════════════════════════════════════════╗"
          echo "║            ✅ DEPLOYMENT COMPLETED SUCCESSFULLY               ║"
          echo "╚════════════════════════════════════════════════════════════════╝"
          echo ""
          echo "📊 FINAL STATUS:"
          echo "  ✓ Build:             SUCCESS"
          echo "  ✓ Deploy:            SYNCED to /dash/"
          echo ""
          echo "🚀 DEPLOYMENT INFORMATION:"
          echo "  • Build Number:      ${{ github.run_number }}"
          echo "  • Version:           v0.1.0+${{ github.run_number }}"
          echo "  • Repository:        ${{ github.repository }}"
          echo "  • Commit:            ${{ github.sha }}"
          echo "  • Timestamp:         $(date -u +'%Y-%m-%dT%H:%M:%SZ')"
          echo ""
          echo "📍 LIVE URL:"
          echo "  https://diegodemorais.github.io/wealth/dash/"
          echo ""
          echo "✨ GitHub Pages will be live in 1-5 minutes"
          echo ""
          echo "╔════════════════════════════════════════════════════════════════╗"

  notification-failed:
    runs-on: ubuntu-latest
    needs: [build, deploy]
    if: failure()
    name: Deployment Failed Notification

    steps:
      - name: Deployment Failed ❌
        run: |
          echo "╔════════════════════════════════════════════════════════════════╗"
          echo "║                ❌ DEPLOYMENT FAILED                           ║"
          echo "╚════════════════════════════════════════════════════════════════╝"
          echo ""
          echo "📊 FINAL STATUS:"
          echo "  ✓ Build:             SUCCESS"
          echo "  ✗ Deploy:            FAILED"
          echo ""
          echo "Check the workflow logs for detailed error information."
          echo ""
          exit 1
