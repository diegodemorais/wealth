name: Deploy Dashboard

on:
  workflow_dispatch:
    inputs:
      skip_prices:
        description: 'Skip yfinance prices (use cached)'
        type: boolean
        default: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout wealth
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install yfinance

      - name: Generate data
        run: |
          cd scripts
          if [ "${{ inputs.skip_prices }}" = "true" ]; then
            python3 generate_data.py --skip-scripts --skip-prices
          else
            python3 generate_data.py --skip-scripts
          fi

      - name: Build dashboard
        run: python3 scripts/build_dashboard.py

      - name: Deploy to wealth-dash
        env:
          DEPLOY_TOKEN: ${{ secrets.WEALTH_DASH_TOKEN }}
        run: |
          git clone https://x-access-token:${DEPLOY_TOKEN}@github.com/diegodemorais/wealth-dash.git /tmp/wealth-dash
          cp dashboard/index.html /tmp/wealth-dash/index.html
          cd /tmp/wealth-dash
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html
          if git diff --cached --quiet; then
            echo "No changes to deploy"
          else
            DATE_BRT=$(TZ="America/Sao_Paulo" date '+%Y-%m-%d %H:%M')
            git commit -m "dashboard: deploy $DATE_BRT"
            git push origin main
            echo "✅ Deployed to https://diegodemorais.github.io/wealth-dash/"
          fi
