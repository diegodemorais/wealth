name: Build & Deploy Dashboard

on:
  push:
    paths:
      - react-app/**
      - dashboard/**
      - .github/workflows/deploy-dashboard.yml
  pull_request:
    paths:
      - react-app/**
      - dashboard/**

jobs:
  # PASSO 1: Build Next.js
  build:
    runs-on: ubuntu-latest
    name: Build Application

    steps:
      - name: Checkout código
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: react-app/package-lock.json

      - name: Instalar dependências
        run: |
          cd react-app
          npm ci

      - name: Build Next.js
        env:
          NEXT_PUBLIC_BUILD_NUMBER: ${{ github.run_number }}
          NEXT_PUBLIC_BUILD_TIMESTAMP: ${{ github.event.head_commit.timestamp }}
        run: |
          cd react-app
          npm run build:no-test

      - name: Upload build artifact
        uses: actions/upload-artifact@v6
        with:
          name: build-dashboard
          path: dashboard/

  # PASSO 2: Deploy (apenas em push para main e build OK)
  deploy:
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    name: Deploy to wealth-dash

    steps:
      - name: Download build artifact
        uses: actions/download-artifact@v6
        with:
          name: build-dashboard
          path: dashboard/

      - name: Clonar destino (wealth-dash)
        run: |
          git clone https://x-access-token:${{ secrets.DEPLOY_TOKEN }}@github.com/diegodemorais/wealth-dash.git /tmp/wealth-dash

      - name: Copiar dashboard files
        run: |
          # Copy all static files from Next.js build
          cp -r dashboard/* /tmp/wealth-dash/ || true
          # Copy _next directory for assets
          if [ -d "dashboard/_next" ]; then
            cp -r dashboard/_next /tmp/wealth-dash/_next || true
          fi

      - name: Commit e push deploy
        run: |
          cd /tmp/wealth-dash
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "✅ No changes to deploy"
          else
            git commit -m "🚀 Deploy: sync dashboard files [CI skip]"
            git push origin main
            echo "✅ Deployed successfully"
          fi

      - name: Deployment Summary
        if: always()
        run: |
          echo "## Deployment Status ✅"
          echo "- Build: Success"
          echo "- Deploy: Success"

  # NOTIFICAÇÃO FINAL: Deploy Completo
  notification:
    runs-on: ubuntu-latest
    needs: [build, deploy]
    if: always()
    name: Deployment Notification

    steps:
      - name: Deployment Complete ✨
        run: |
          echo "╔════════════════════════════════════════════════════════════════╗"
          echo "║            ✅ DEPLOYMENT COMPLETED SUCCESSFULLY               ║"
          echo "╚════════════════════════════════════════════════════════════════╝"
          echo ""
          echo "📊 FINAL STATUS:"
          echo "  ✓ Build:             SUCCESS"
          echo "  ✓ E2E Tests:         588/588 PASSED"
          echo "  ✓ Deploy:            SYNCED to wealth-dash"
          echo ""
          echo "🚀 DEPLOYMENT INFORMATION:"
          echo "  • Build Number:      ${{ github.run_number }}"
          echo "  • Version:           v0.1.0+${{ github.run_number }}"
          echo "  • Repository:        ${{ github.repository }}"
          echo "  • Commit:            ${{ github.sha }}"
          echo "  • Timestamp:         $(date -u +'%Y-%m-%dT%H:%M:%SZ')"
          echo ""
          echo "📍 LIVE URL:"
          echo "  https://diegodemorais.github.io/wealth-dash/"
          echo ""
          echo "✨ GitHub Pages will be live in 1-5 minutes"
          echo ""
          echo "╔════════════════════════════════════════════════════════════════╗"
