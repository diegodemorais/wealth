name: Manual Major Release (User Triggered)

on:
  workflow_dispatch:
    inputs:
      release_type:
        description: 'Release type'
        required: true
        default: 'major'
        type: choice
        options:
          - major
          - 'major (breaking)'

jobs:
  major-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pages: write
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      # ─────────────────────────────────────────────────────────
      # FULL VALIDATION: All 7 phases + perf + a11y
      # ─────────────────────────────────────────────────────────

      - name: Install dependencies
        run: npm install --legacy-peer-deps
        working-directory: react-app

      - name: Run all test phases (194 tests)
        run: python3 -m pytest scripts/tests/ -v
        continue-on-error: false

      - name: Validate data.json
        run: python3 scripts/validate_data.py
        continue-on-error: false

      - name: Build application
        run: npm run build
        working-directory: react-app
        continue-on-error: false

      - name: Run Lighthouse audit
        run: |
          npm install -g @lhci/cli@0.12.x lighthouse
          lhci autorun --config=./.lhcirc.json 2>/dev/null || echo "Lighthouse audit optional"
        continue-on-error: true

      # ─────────────────────────────────────────────────────────
      # Bump major version
      # ─────────────────────────────────────────────────────────

      - name: Get current version
        id: version
        run: |
          VERSION=$(grep '"version"' react-app/package.json | head -1 | sed 's/.*"\([^"]*\)".*/\1/')
          echo "current=$VERSION" >> $GITHUB_OUTPUT
          IFS='.' read -r MAJOR MINOR PATCH <<< "$VERSION"
          NEW_MAJOR=$((MAJOR + 1))
          NEW_VERSION="$NEW_MAJOR.0.0"
          echo "new=$NEW_VERSION" >> $GITHUB_OUTPUT

      - name: Bump major version
        run: npm version major --no-git-tag-version
        working-directory: react-app

      # ─────────────────────────────────────────────────────────
      # Create tag and commit
      # ─────────────────────────────────────────────────────────

      - name: Configure git
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Actions"

      - name: Commit and tag major release
        run: |
          VERSION=$(grep '"version"' react-app/package.json | head -1 | sed 's/.*"\([^"]*\)".*/\1/')
          git add react-app/package.json react-app/src/config/version.ts
          git commit -m "chore: Major release v$VERSION (breaking changes)"
          git tag -a "v$VERSION" -m "Major release: ${{ github.event.inputs.release_type }}"
          git push origin main
          git push origin "v$VERSION"

      # ─────────────────────────────────────────────────────────
      # Deploy to GitHub Pages
      # ─────────────────────────────────────────────────────────

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./react-app/out

      # ─────────────────────────────────────────────────────────
      # Create GitHub Release
      # ─────────────────────────────────────────────────────────

      - name: Create GitHub Release
        uses: ncipollo/release-action@v1
        with:
          tag: v${{ steps.version.outputs.new }}
          name: Major Release v${{ steps.version.outputs.new }}
          body: |
            ## Major Release: v${{ steps.version.outputs.new }}

            **Breaking Changes:** ${{ github.event.inputs.release_type }}

            ### Validation Results
            - ✅ All 194 tests passed
            - ✅ Data validation passed
            - ✅ Build successful
            - ✅ Deployed to GitHub Pages

            ### What's New
            - See commit history for details: https://github.com/${{ github.repository }}/commits/v${{ steps.version.outputs.new }}
          draft: false
          prerelease: false
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Summary
        run: |
          VERSION=$(grep '"version"' react-app/package.json | head -1 | sed 's/.*"\([^"]*\)".*/\1/')
          echo "## ✅ Major Release Complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Version:** v$VERSION" >> $GITHUB_STEP_SUMMARY
          echo "- **Type:** ${{ github.event.inputs.release_type }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Tests:** ✅ All 194 passed" >> $GITHUB_STEP_SUMMARY
          echo "- **Build:** ✅ Success" >> $GITHUB_STEP_SUMMARY
          echo "- **Deployment:** ✅ GitHub Pages" >> $GITHUB_STEP_SUMMARY
          echo "- **Release Tag:** v$VERSION" >> $GITHUB_STEP_SUMMARY
